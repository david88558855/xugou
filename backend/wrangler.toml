name = "xugou-backend"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "dd"
database_id = "557706e0-d045-4e47-a995-dab733e4d408"

[version_metadata]
binding = "CF_VERSION_METADATA"
